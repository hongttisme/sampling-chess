<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>bottisme · position analyzer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  .az-layout {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 380px;
    gap: 24px; align-items: start;
  }
  .az-board-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .az-board { width: min(580px, 90vw); position: relative; }
  /* clickable overlay for "what if I play X" */
  .az-board .sq { cursor: pointer; }
  .az-board .sq:hover .piece { transform: translateY(-3px); }

  .fen-row {
    display: grid; grid-template-columns: minmax(0,1fr) auto auto auto;
    gap: 8px; align-items: center;
    margin-bottom: 18px;
  }
  .fen-row .input { font-size: 11.5px; }
  .preset-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 18px; }

  .v-display {
    display: flex; align-items: baseline; gap: 12px;
    padding: 18px 20px;
    background: var(--raised); border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .v-display .v-big {
    font-family: var(--font-mono); font-size: 38px; font-weight: 600;
    letter-spacing: -0.03em; line-height: 1;
  }
  .v-display .v-big.pos { color: var(--pos); }
  .v-display .v-big.neg { color: var(--neg); }
  .v-display .v-desc { font-family: var(--font-mono); font-size: 12px; color: var(--ink-2); }
  .v-display .v-trail { margin-left: auto; font-family: var(--font-mono); font-size: 11px; color: var(--muted); }

  .turn-pill {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--font-mono); font-size: 11px;
    color: var(--ink-2);
  }

  /* PV (principal variation) line */
  .pv-card { padding: 16px 18px; }
  .pv-moves {
    display: flex; flex-wrap: wrap; gap: 4px;
    font-family: var(--font-mono); font-size: 13px;
    margin-top: 8px;
  }
  .pv-move {
    background: var(--bg-2); padding: 4px 8px; border-radius: 3px;
    cursor: pointer; color: var(--ink); letter-spacing: -0.01em;
    border: 1px solid transparent;
  }
  .pv-move:hover { border-color: var(--border-strong); }
  .pv-move.is-bot { background: var(--accent-soft); color: var(--accent); }
  .pv-move.is-current { box-shadow: 0 0 0 1px var(--ink); background: var(--raised); }

  /* What-if branch panel */
  .branch-card { padding: 16px 18px; }
  .branch-empty { font-family: var(--font-mono); font-size: 12px; color: var(--muted); padding: 12px 0; text-align: center; }
  .branch-comp {
    display: flex; align-items: center; gap: 12px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    font-family: var(--font-mono); font-size: 13px;
  }
  .branch-comp .arrow { color: var(--muted); }
  .branch-v { font-size: 16px; font-weight: 600; }
  .branch-v.pos { color: var(--pos); }
  .branch-v.neg { color: var(--neg); }
  .branch-delta { margin-left: auto; font-size: 11px; color: var(--muted); }

  /* Top-10 rows are .alt-row from styles.css */
  @media (max-width: 1000px) { .az-layout { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script type="text/babel" src="pieces.jsx"></script>
<script type="text/babel" src="engine.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>

<script type="text/babel" src="analyze.jsx"></script>
</body>
</html>
